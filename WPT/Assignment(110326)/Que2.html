<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,
                                   initial-scale=1.0">
    <title>Animation</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
	
	<script>
		$(document).ready(function()
		{
				$("#bt1").click(function()
				{
					$("#p1").animate({left : "300px"});	
					$("#p1").animate({width : "300px"});
					$("#p1").animate({height : "500px"});
					$("#p1").animate({right : "200px"});
					$("#p1").animate({width : "100px"});
					$("#p1").animate({height: "100px"});
				}
				);
		}
		);
    </script>
</head>

<body>

    <div id="p1" style="height :100px ;width :100px ;background-color:orange ;position: relative;">DO YOU KNOW??</div>
	
    <button id="bt1">Animation</button>
</body>

</html>

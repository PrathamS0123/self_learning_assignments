<html>
<head>
<title>Validation</title>
</head>

<body>

<form name="form1" onsubmit="return validate()" action="Home.html">

<fieldset>
<legend>New User Registration</legend>

<label>Username</label>
<input type="text" name="fname" required><br><br>

<label>Password</label>
<input type="password" name="pass" required><br><br>

<input type="submit" value="submit">

</fieldset>

</form>

<script>

function validate()
{
    let data = document.forms["form1"]["fname"].value;
    let pass = document.forms["form1"]["pass"].value;

    if(data.trim() == "" || data.length <= 2 || !isNaN(data))
    {
        alert("Username should not be empty and should have more than 2 characters");
        return false;
    }

    if(pass.trim() == "" || pass.length < 3)
    {
        alert("Password should not be empty and should have more than 2 characters");
        return false;
    }

    if(data === "iet" && pass === "iet")
    {
        return true; 
    }
    else
    {
        alert("Wrong username and password");
        return false; 
    }
}

</script>

</body>
</html>

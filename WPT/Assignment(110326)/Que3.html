<html>

<head>
    <script>
        function validate() {
            let element = document.getElementById("t1")
            console.log(element.checkValidity())
            if (element.checkValidity()) {
                document.getElementById("p1").innerText = "OK"
            }
            else
                document.getElementById("p1").innerText = element.validationMessage
        }
    </script>
</head>



<body>
<fieldset>
<legend>Validation</legend>
	<label>name: </label>
	<input type="text" required id="t1" minlength="2" maxlength="20"  />
	<p id="p1"></p>
	
    <input type="button" value="Enter" onclick="validate()" />
</fieldset>

</body>

</html>
